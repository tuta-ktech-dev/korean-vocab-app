name: korean_vocab
description: "Korean Vocabulary Learning App with Smart SRS"
publish_to: "none"

version: 2.2.0+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_tts: ^4.2.5
  flip_card: ^0.7.0
  swipable_stack: ^2.0.0
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  image_picker: ^1.2.1
  path: ^1.9.1
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF6B9D"
  adaptive_icon_foreground: "assets/images/logo.png"
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/seed/
